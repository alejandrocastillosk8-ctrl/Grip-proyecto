<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grip</title>
    <link rel="stylesheet" href="../css/stille.css">
</head>
<body>

    <div class="interface-container">
        
        <header class="header">Out of Bounds</header>
        
        <aside class="aside">
            <h2>Categorias</h2>
            <nav class="Categorias-itens">
                <a href="#">Ropa <span>12</span></a>
                <a href="#">Ruedas <span>4</span></a>
                <a href="#">Tablas <span>17</span></a>
                <a href="#">Zapatos <span>2</span></a>
            </nav>
        </aside>

        <main class="product-zone">
            
            <article class="produc-card">
                <img src="../img/santa cruz.webp" alt="Madero Santa Cruz" class="product-img">
                <h3 class="product-title">Tabla Santa Cruz</h3>
                <p class="product-price">350.000</p>
                <button class="buy-btn">Buy</button>
            </article>

            <article class="produc-card">
                <img src="../img/buzo.webp" alt="Buzo" class="product-img">
                <h3 class="product-title">Buzo Fit</h3>
                <p class="product-price">150.000</p>
                <button class="buy-btn">Buy</button>
            </article>

            <article class="produc-card">
                <img src="../img/ruedas.jpg" alt="Ruedas Spitfire" class="product-img">
                <h3 class="product-title">Ruedas Spitfire</h3>
                <p class="product-price">90.000</p>
                <button class="buy-btn">Buy</button>
            </article>

            <article class="produc-card">
                <img src="../img/zaptos.jpg" alt="Clop" class="product-img">
                <h3 class="product-title">Clop</h3>
                <p class="product-price">420.000</p>
                <button class="buy-btn">Buy</button>
            </article>
            
        </main>

        <footer class="footer">@Just skate</footer>

    </div>
    
</body>
</html>
